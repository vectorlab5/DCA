# Default configuration for Deep Conformal Alignment experiments

# Dataset configuration
data:
  root_dir: "./data/NCT-CRC-HE-100K"
  val_root_dir: "./data/CRC-VAL-HE-7K"
  num_classes: 9
  image_size: 224
  val_split: 0.2
  test_split: 0.2
  num_workers: 4

# Model configuration
model:
  name: "dca"  # Options: dca, resnet18, resnet50, efficientnet_b0, vit, stn_affine, stn_tps
  backbone: "resnet18"  # Backbone for DCA
  pretrained: true
  num_squaring_steps: 7  # T for scaling-and-squaring

# Loss configuration
loss:
  classification_weight: 1.0
  conformal_weight: 1.0  # lambda_conf
  smoothness_weight: 0.1  # lambda_smooth

# Training configuration
training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"  # Options: adam, adamw, sgd
  scheduler: "cosine"  # Options: cosine, step, plateau
  warmup_epochs: 5
  early_stopping_patience: 10
  gradient_clip: 1.0

# Augmentation configuration
augmentation:
  random_horizontal_flip: true
  random_vertical_flip: true
  random_rotation: 15  # degrees
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.0

# Cross-validation configuration
cv:
  n_folds: 5
  stratified: true
  random_seeds: [42, 123, 456, 789, 1024]

# Evaluation configuration
evaluation:
  metrics: ["accuracy", "f1_macro", "kappa", "per_class_accuracy"]
  save_predictions: true
  save_confusion_matrix: true
  compute_confidence_intervals: true

# Logging and checkpointing
logging:
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  tensorboard: true
  save_frequency: 5  # epochs
  log_frequency: 10  # iterations

# Experiment-specific configurations
experiment:
  type: "main"  # Options: main, data_efficiency, ablation, hyperparameter, robustness
  name: "dca_default"
  seed: 42
  device: "cuda"  # Options: cuda, cpu
  mixed_precision: false
